<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>06 - 关系引擎 | CardFrame 示例</title>
  <link rel="stylesheet" href="../src/card-framework.css">
</head>
<body>
  <header class="app-header">
    <h1>🔗 关系引擎</h1>
    <p>创建卡片间关系、SVG 连线可视化、多种关系类型展示</p>
    <p><a href="index.html" class="back-link">← 返回示例列表</a></p>
  </header>

  <main class="app-main">
    <aside class="control-panel">
      <div class="section">
        <h3>关系管理</h3>
        <div class="form-group">
          <label>源卡片：</label>
          <select id="sourceCard">
            <option value="">选择源卡片</option>
          </select>
        </div>
        <div class="form-group">
          <label>目标卡片：</label>
          <select id="targetCard">
            <option value="">选择目标卡片</option>
          </select>
        </div>
        <div class="form-group">
          <label>关系类型：</label>
          <select id="relType">
            <option value="reference">引用</option>
            <option value="parent">父子</option>
            <option value="related">关联</option>
            <option value="depend">依赖</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="createRelationship()">创建关系</button>
      </div>

      <div class="section">
        <h3>关系可视化</h3>
        <button class="btn btn-primary" onclick="enableRelationships()">启用关系线</button>
        <button class="btn" onclick="disableRelationships()">禁用关系线</button>
        <button class="btn" onclick="showAllRelationships()">查看所有关系</button>
      </div>

      <div class="section">
        <h3>快速演示</h3>
        <button class="btn btn-primary" onclick="createDemoGraph()">创建演示图谱</button>
        <button class="btn btn-danger" onclick="clearAll()">清空所有</button>
      </div>

      <div class="section">
        <h3>关系类型说明</h3>
        <ul class="type-list">
          <li><span class="rel-dot reference"></span> 引用 - 普通引用关系</li>
          <li><span class="rel-dot parent"></span> 父子 - 层级包含关系</li>
          <li><span class="rel-dot related"></span> 关联 - 相互关联</li>
          <li><span class="rel-dot depend"></span> 依赖 - 依赖关系</li>
        </ul>
      </div>

      <div class="section">
        <h3>状态</h3>
        <p>卡片数量：<span id="cardCount">0</span></p>
        <p>关系数量：<span id="relCount">0</span></p>
      </div>
    </aside>

    <section class="card-container" id="cardContainer">
      <cf-card type="text" title="关系引擎演示" position-x="50" position-y="50">
        <p>这个示例展示卡片之间的关系和连线可视化。</p>
        <br>
        <p>点击「创建演示图谱」快速体验！</p>
      </cf-card>
    </section>
  </main>

  <script src="../src/card-framework.js"></script>
  <script>
    let frame;

    document.addEventListener('DOMContentLoaded', () => {
      frame = new CardFrame('#cardContainer');
      frame.setLayoutMode('canvas');
      updateStats();
      updateCardSelects();

      frame.store.subscribe(() => {
        updateStats();
        updateCardSelects();
      });
    });

    function updateStats() {
      if (!frame) return;
      document.getElementById('cardCount').textContent = frame.getAllCards().length;
      document.getElementById('relCount').textContent = frame.store.getAllRelationships
        ? frame.store.getAllRelationships().length
        : 0;
    }

    function updateCardSelects() {
      if (!frame) return;
      
      const cards = frame.getAllCards();
      const sourceSelect = document.getElementById('sourceCard');
      const targetSelect = document.getElementById('targetCard');

      const currentSource = sourceSelect.value;
      const currentTarget = targetSelect.value;

      sourceSelect.innerHTML = '<option value="">选择源卡片</option>';
      targetSelect.innerHTML = '<option value="">选择目标卡片</option>';

      cards.forEach(card => {
        const title = card.props.title || card.id;
        sourceSelect.innerHTML += `<option value="${card.id}">${title}</option>`;
        targetSelect.innerHTML += `<option value="${card.id}">${title}</option>`;
      });

      sourceSelect.value = currentSource;
      targetSelect.value = currentTarget;
    }

    function createRelationship() {
      const sourceId = document.getElementById('sourceCard').value;
      const targetId = document.getElementById('targetCard').value;
      const type = document.getElementById('relType').value;

      if (!sourceId || !targetId) {
        alert('请选择源卡片和目标卡片');
        return;
      }

      if (sourceId === targetId) {
        alert('源卡片和目标卡片不能相同');
        return;
      }

      const rel = frame.createRelationship(sourceId, targetId, type);
      console.log('创建的关系:', rel);
      alert('关系创建成功！');
    }

    function enableRelationships() {
      if (frame.relationshipEngine) {
        frame.relationshipEngine.enable();
        alert('关系线已启用');
      }
    }

    function disableRelationships() {
      if (frame.relationshipEngine) {
        frame.relationshipEngine.disable();
        alert('关系线已禁用');
      }
    }

    function showAllRelationships() {
      const rels = frame.store.getAllRelationships
        ? frame.store.getAllRelationships()
        : [];
      console.log('所有关系:', rels);
      alert(`当前共有 ${rels.length} 个关系，请查看控制台`);
    }

    function createDemoGraph() {
      clearAll();

      const centerCard = frame.createCard('text', {
        title: '🎯 中心主题',
        content: '这是一个知识图谱的中心节点',
        position: { x: 400, y: 250 }
      });

      const card1 = frame.createCard('text', {
        title: '📚 概念A',
        content: '子概念 A 的详细说明',
        position: { x: 100, y: 100 }
      });

      const card2 = frame.createCard('text', {
        title: '🔧 概念B',
        content: '子概念 B 的详细说明',
        position: { x: 700, y: 100 }
      });

      const card3 = frame.createCard('task', {
        title: '任务 C',
        priority: 'high',
        position: { x: 100, y: 350 }
      });

      const card4 = frame.createCard('task', {
        title: '任务 D',
        priority: 'medium',
        position: { x: 700, y: 350 }
      });

      const card5 = frame.createCard('progress', {
        title: '进度 E',
        value: 75,
        max: 100,
        unit: '%',
        position: { x: 400, y: 450 }
      });

      frame.createRelationship(centerCard.id, card1.id, 'parent');
      frame.createRelationship(centerCard.id, card2.id, 'parent');
      frame.createRelationship(centerCard.id, card3.id, 'reference');
      frame.createRelationship(centerCard.id, card4.id, 'depend');
      frame.createRelationship(centerCard.id, card5.id, 'related');
      frame.createRelationship(card1.id, card2.id, 'related');
      frame.createRelationship(card3.id, card4.id, 'depend');

      if (frame.relationshipEngine) {
        frame.relationshipEngine.enable();
      }

      alert('演示图谱创建成功！共 6 张卡片，7 个关系');
    }

    function clearAll() {
      const cards = frame.getAllCards();
      cards.forEach(card => {
        frame.removeCard(card.id);
      });
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f7fa;
      color: #333;
    }

    .app-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .app-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .app-header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .back-link {
      color: white;
      text-decoration: underline;
      font-size: 13px;
      opacity: 0.9;
    }

    .app-main {
      display: flex;
      gap: 24px;
      padding: 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .control-panel {
      width: 300px;
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 24px;
      height: fit-content;
    }

    .control-panel .section {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }

    .control-panel .section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .control-panel h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #666;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      background-color: #e0e0e0;
      color: #333;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    .btn:hover {
      background-color: #d0d0d0;
    }

    .btn-primary {
      background-color: #2196f3;
      color: white;
    }

    .btn-primary:hover {
      background-color: #1976d2;
    }

    .btn-danger {
      background-color: #f44336;
      color: white;
    }

    .btn-danger:hover {
      background-color: #d32f2f;
    }

    .type-list {
      list-style: none;
      font-size: 13px;
      line-height: 2;
    }

    .type-list li {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rel-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .rel-dot.reference { background-color: #2196f3; }
    .rel-dot.parent { background-color: #4caf50; }
    .rel-dot.related { background-color: #ff9800; }
    .rel-dot.depend { background-color: #f44336; }

    .card-container {
      flex: 1;
      height: calc(100vh - 200px);
      min-height: 500px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .app-main {
        flex-direction: column;
      }

      .control-panel {
        width: 100%;
        position: static;
      }

      .card-container {
        height: 500px;
      }
    }
  </style>
</body>
</html>
